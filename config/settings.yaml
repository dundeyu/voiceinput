offline_mode: false
vad_model_path: ''
model:
  path: ''
  device: ''
  default_language: 中文
  supported_languages:
  - 中文
  - 英文
  - 日文
audio:
  input_sample_rate: 48000
  target_sample_rate: 16000
  channels: 1
  dtype: float32
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: logs/voice_input.log
  console: false
temp:
  audio_dir: temp
  audio_filename: recording.wav
filler_words:
- 呃
- 嗯
- 啊
- 这个
- 就是
- 然后
- 所以
- 其实
- 的话
vocabulary_corrections:
  cloud code: claude code
  open cloud: openclaw
  定制油: 定制游
  PICK FAIR: PKFARE
  道侣: 道旅
  洗完: 喜玩
  制裁: 直采
  阿高大: AGODA
  隔壁: GOBI
  code x: codex
